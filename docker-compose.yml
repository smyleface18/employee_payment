version: '3.9'

services:
  mongo:
    image: mongo:7.0
    container_name: mongodb-employees
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: salarydb
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
